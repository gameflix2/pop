<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Gameflix</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #000; margin: 0; padding: 0; }
        
        /* Botão Voltar */
        .btn-back {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 9999;
            border-radius: 4px;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-back:hover { background: #e50914; }

        #gamePageModal { display: flex; width: 100%; justify-content: center; padding-top: 60px; padding-bottom: 40px; }
        .modal-content { 
            background: #181818; 
            width: 90%; 
            max-width: 900px; 
            box-shadow: 0 0 80px rgba(229, 9, 20, 0.6); 
            border-radius: 8px;
            overflow: hidden;
        }
        .screenshot-container { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; }
        .screenshot-container img { width: 280px; height: 160px; border-radius: 8px; object-fit: cover; border: 1px solid #333; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">← VOLTAR AO INÍCIO</a>

    <div id="gamePageModal">
        <div class="modal-content">
            <div class="modal-hero" style="height: 500px;">
                <iframe id="gameVideo" style="width:100%; height:100%; border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="modal-info">
                <h2 id="modalTitle" style="font-family: 'Bebas Neue', sans-serif; font-size: 3rem;">Carregando...</h2>
                <p id="modalDesc" style="color: #a3a3a3; line-height: 1.6;">Descrição...</p>
                
                <div class="modal-actions">
                    <button class="btn-play">▶ JOGAR AGORA</button>
                    <button class="btn-info">+ Minha Lista</button>
                </div>

                <div class="modal-section">
                    <h3 style="color: #fff; border-left: 4px solid #e50914; padding-left: 10px;">CAPTURAS DE TELA</h3>
                    <div class="screenshot-container">
                        <img src="https://via.placeholder.com/280x160/222/fff?text=Imagem+1" alt="Screenshot 1">
                        <img src="https://via.placeholder.com/280x160/222/fff?text=Imagem+2" alt="Screenshot 2">
                        <img src="https://via.placeholder.com/280x160/222/fff?text=Imagem+3" alt="Screenshot 3">
                    </div>
                </div>

                <div class="modal-section" style="background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); padding: 25px; border-radius: 12px; border: 1px solid #e50914; margin: 25px 0;">
                    <h3 style="color: #e50914; margin-top: 0; font-family: 'Bebas Neue';">🔥 OFERTAS EXCLUSIVAS GAMEFLIX</h3>
                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <div style="background: #222; padding: 15px; border-radius: 8px; flex: 1; text-align: center;">
                            <span style="display: block; font-size: 11px; color: #aaa;">MENSAL</span>
                            <strong style="color: #fff; font-size: 22px;">R$ 29,90</strong>
                        </div>
                        <div style="background: #e50914; padding: 15px; border-radius: 8px; flex: 1; text-align: center;">
                            <span style="display: block; font-size: 11px; color: #eee;">ANUAL</span>
                            <strong style="color: #fff; font-size: 22px;">R$ 199,90</strong>
                        </div>
                    </div>
                </div>

                <div style="padding: 40px 0; text-align: center;">
                    <a href="https://wa.me/5553981045078" class="btn-wpp-glow" style="text-decoration: none;">FALE COM O SUPORTE</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('modalTitle').innerText = params.get('title') || 'Jogo';
        document.getElementById('modalDesc').innerText = params.get('desc') || '';
        const videoId = params.get('video');
        if (videoId) {
            document.getElementById('gameVideo').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
        }
    </script>
</body>
</html>
